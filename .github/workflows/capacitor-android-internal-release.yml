name: Capacitor Android Internal Release

on:
  workflow_dispatch:

concurrency:
  group: capacitor-android-internal-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release Android internal build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ANDROID_BUILD_TOOLS_VERSION: 36.0.0
      PLAY_PACKAGE_NAME: me.payky
      PLAY_TRACK: internal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}"

      - name: Configure Android SDK environment
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_HOME}" >> "${GITHUB_ENV}"
          echo "${ANDROID_HOME}/build-tools/${ANDROID_BUILD_TOOLS_VERSION}" >> "${GITHUB_PATH}"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-capacitor-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-capacitor-
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" || -z "${ANDROID_KEYSTORE_PASSWORD}" || -z "${ANDROID_KEY_ALIAS}" || -z "${ANDROID_KEY_PASSWORD}" ]]; then
            echo "::error::Internal release builds require ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD secrets."
            exit 1
          fi

          if [[ -z "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON}" ]]; then
            echo "::error::Internal release builds require the GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret."
            exit 1
          fi

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > payky-release.keystore

      - name: Set internal build version code
        run: |
          perl -0pi -e "s/versionCode\s+\d+/versionCode ${GITHUB_RUN_NUMBER}/" android/app/build.gradle

      - name: Build release AAB
        env:
          PAYKY_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          PAYKY_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          PAYKY_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bun run cap:android:build:aab

      - name: Upload release Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: payky-capacitor-android-internal-release
          path: android/app/build/outputs/bundle/**/*-signed.aab
          if-no-files-found: error

      - name: Release to Google Play internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PLAY_PACKAGE_NAME }}
          releaseFiles: android/app/build/outputs/bundle/**/*-signed.aab
          tracks: ${{ env.PLAY_TRACK }}
          status: completed
