<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 896 896" role="img" aria-labelledby="title desc">
  <title id="title">Animated Payky honey badger coin logo</title>
  <desc id="desc">Animated Payky app icon with a warm gold coin shimmer and honey badger mark.</desc>
  <style>
    :root {
      color-scheme: light dark;
    }

    .coin {
      animation: coin-breathe 4.8s ease-in-out infinite;
      filter: drop-shadow(0 26px 42px rgb(0 0 0 / 0.28));
      transform-origin: 441px 448px;
    }

    .rim {
      animation: rim-pulse 4.8s ease-in-out infinite;
    }

    .shine {
      animation: shine-sweep 3.8s cubic-bezier(0.45, 0, 0.2, 1) infinite;
      mix-blend-mode: screen;
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
    }

    .mark {
      animation: mark-settle 900ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      transform-box: fill-box;
      transform-origin: center;
    }

    .eye-glint {
      animation: eye-glint 3.8s ease-in-out 1.2s infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    @keyframes coin-breathe {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes rim-pulse {
      0%, 100% {
        opacity: 0.26;
        stroke-width: 12;
      }
      50% {
        opacity: 0.48;
        stroke-width: 18;
      }
    }

    @keyframes shine-sweep {
      0% {
        opacity: 0;
        transform: translateX(-58%) rotate(-18deg);
      }
      18% {
        opacity: 0.4;
      }
      42% {
        opacity: 0;
        transform: translateX(62%) rotate(-18deg);
      }
      100% {
        opacity: 0;
        transform: translateX(62%) rotate(-18deg);
      }
    }

    @keyframes mark-settle {
      0% {
        opacity: 0;
        transform: translateY(14px);
      }
      68% {
        opacity: 1;
        transform: translateY(-2px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes eye-glint {
      0%, 72%, 100% {
        opacity: 0;
        transform: scale(0.45);
      }
      78% {
        opacity: 0.86;
        transform: scale(1.05);
      }
      84% {
        opacity: 0;
        transform: scale(0.45);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .coin,
      .rim,
      .shine,
      .mark,
      .eye-glint {
        animation: none;
      }

      .shine,
      .eye-glint {
        opacity: 0;
      }
    }
  </style>

  <defs>
    <radialGradient id="paykyGoldSoft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(351 258) rotate(63) scale(683.6 560)">
      <stop offset="0" stop-color="#F8D96A" />
      <stop offset="0.7" stop-color="#D49A24" />
      <stop offset="1" stop-color="#B87918" />
    </radialGradient>
    <linearGradient id="rimGold" x1="128" y1="104" x2="742" y2="842" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF0A3" />
      <stop offset="0.48" stop-color="#D99A22" />
      <stop offset="1" stop-color="#8F5811" />
    </linearGradient>
    <linearGradient id="shineGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="0.48" stop-color="#FFFFFF" stop-opacity="0.72" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
    <clipPath id="coinClip">
      <ellipse cx="441" cy="448" rx="441" ry="448" />
    </clipPath>
    <clipPath id="artboardClip">
      <rect width="896" height="896" />
    </clipPath>
  </defs>

  <rect width="896" height="896" fill="transparent" />

