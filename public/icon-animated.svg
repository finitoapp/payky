          <ellipse class="rim" cx="441" cy="448" rx="417" ry="424" fill="none" stroke="url(#rimGold)" />
          <g clip-path="url(#coinClip)">
            <rect class="shine" x="-128" y="-104" width="220" height="1104" fill="url(#shineGradient)" />
