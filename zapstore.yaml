name: Payky
summary: Payky combines bank transfers, cash, and Bitcoin payments in one local-first payment terminal.
description: |
    Payky is a local-first payment terminal that combines classic bank transfers for the Czech and Slovak markets, cash payments, and Bitcoin Lightning payments.
    Create payment requests, show QR codes, and keep a clear history of payments on your device.

    Main features:
    • Accept Czech and Slovak bank transfer QR payments
    • Record cash payments
    • Accept Bitcoin Lightning payments
    • Create payment requests
    • Track payment history
    • Manage terminal settings locally
    • Sync app data with Evolu

    Payky is designed for small merchants, events, pop-ups, and anyone who needs a simple payment terminal.

